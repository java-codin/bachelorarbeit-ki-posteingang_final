# Diese Datei beschreibt die einfache Organisationskonfiguration der früheren
# Pipeline-Versionen. Sie bildet die Kommune als flache Liste fachlicher Teams ab
# und dient als konfigurierbare Alternative zu hart codierten Zuständigkeiten im
# Python-Code.
#
# Funktionsweise:
# - Jeder Schlüssel unter `teams` ist eine stabile technische Team-ID. Diese ID
#   wird in Pipeline-Ergebnissen, Evaluationen und Weiterleitungslogik verwendet.
# - `name`, `department` und `email` beschreiben die sichtbare Organisationseinheit
#   und das simulierte Weiterleitungsziel.
# - `description`, `keywords` und `services` liefern dem Klassifikator fachliche
#   Signale für die Zuordnung eines Bürgeranliegens.
# - `answer_role` steuert den Ton und die fachliche Perspektive des Antwortentwurfs.
#   Der Text begrenzt die Antwort auf die jeweilige Zuständigkeit und verhindert,
#   dass ein Team Entscheidungen anderer Fachbereiche vorwegnimmt.
# - Änderungen an Zuständigkeiten, Begriffen oder E-Mail-Zielen sollen hier
#   gepflegt werden, damit die Pipeline ohne Codeänderung anpassbar bleibt.
teams:
  buergerbuero:
    name: Bürgerbüro
    department: Fachbereich Bürgerservice
    email: buergerbuero@kommune.test
    description: Zuständig für Meldeangelegenheiten, Ausweisdokumente und allgemeine Bürgerdienste.
    answer_role: >
      Du antwortest als sachbearbeitende Person im Bürgerbüro. Du bist
      zuständig für Meldeangelegenheiten, Ausweisdokumente und allgemeine
      Bürgerdienste. Sprich aus unserer Perspektive im Bürgerbüro, zum Beispiel
      "bei uns im Bürgerbüro" oder "wir benötigen". Formuliere praktisch,
      serviceorientiert und mit klarem Hinweis auf Online-, Termin- oder Vorsprachewege, ohne Entscheidungen
      anderer Fachbereiche vorwegzunehmen.
    keywords:
      - personalausweis
      - reisepass
      - kinderreisepass
      - anmeldung
      - ummeldung
      - abmeldung
      - meldebescheinigung
      - führungszeugnis
      - beglaubigung
    services:
      - Personalausweis beantragen
      - Reisepass beantragen
      - Wohnsitz anmelden
      - Wohnsitz ummelden
      - Führungszeugnis beantragen
      - Meldebescheinigung beantragen

