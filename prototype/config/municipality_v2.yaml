# Diese Datei beschreibt die erweiterte Organisationskonfiguration für die
# aktuelle v5-Pipeline. Sie modelliert die Beispielkommune hierarchisch und hält
# kommunale Zuständigkeiten, Weiterleitungsziele, Antwortrollen und fachliche
# Suchsignale außerhalb des Python-Codes.
#
# Funktionsweise:
# - `answer_templates` enthält zentrale Textbausteine, die von der Antwortlogik
#   zusätzlich zu fachbereichsspezifischen Rollen verwendet werden können.
# - `schema_version` kennzeichnet das erwartete Organisationsschema und erleichtert
#   den späteren Abgleich mit Parsern, Tests oder Evaluationsexporten.
# - `municipality` beschreibt die fiktive Kommune als Kontext für Antwortentwürfe
#   und Demonstrationsausgaben.
# - `department_groups` bildet die Verwaltungsstruktur ab: Dezernate enthalten
#   Fachbereiche, Fachbereiche enthalten Bereiche, Bereiche enthalten Teams.
# - `unit_type` macht jede Ebene maschinenlesbar und hilft der Pipeline, Einheiten
#   eindeutig als Dezernat, Fachbereich, Bereich oder Team zu interpretieren.
# - `public_label`, `internal_label` und `email` trennen sichtbare Bezeichnungen
#   von internen Namen und simulierten Weiterleitungszielen.
# - `knowledge_category` verbindet Organisationseinheiten mit passenden Inhalten
#   der Wissensbasis. Dadurch kann Retrieval fachlich passend eingeschränkt oder
#   ausgewertet werden.
# - `description`, `keywords` und `services` liefern Klassifikationssignale für
#   Routing, Top-3-Vorschläge und Evaluation.
# - `answer_role` definiert die fachliche Perspektive, Tonalität und Grenzen der
#   Antwortgenerierung. Die Antwort bleibt dadurch ein quellengebundener Entwurf
#   aus Sicht der zuständigen Organisationseinheit.
# - Zuständigkeiten, Rollen und Weiterleitungsadressen sollen in dieser Datei
#   gepflegt werden, damit v5 fachlich anpassbar bleibt, ohne Routingregeln im
#   Code zu verstecken.
answer_templates:
  official_closing_notice: >-
    Hinweis: Beachten Sie, dass Ihre E-Mail in vielen Fällen nicht die formelle
    Beantragung ersetzt. Für die formelle Beantragung nutzen Sie bitte den
    vorgesehenen Online- bzw. Terminservice unter
    https://serviceportal.musterstadt.example/terminservice. Falls eine persönliche
    Vorsprache erforderlich ist, erfolgt die Terminvereinbarung über den zuständigen
    Fachbereich bzw. die dort bereitgestellten Terminangebote.

