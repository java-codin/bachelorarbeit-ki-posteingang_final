name: Deploy Evaluation Site

on:
  push:
    branches: [main]
    paths:
      - "prototype/reports/evaluation_site/**"
      - ".github/workflows/deploy-evaluation-site.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Upload static report
        uses: actions/upload-pages-artifact@v3
        with:
          path: prototype/reports/evaluation_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4